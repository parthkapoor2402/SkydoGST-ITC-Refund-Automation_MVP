name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: true
  # E2E uses deterministic Grok mock; real key optional for CI
  E2E_MOCK_GROK: '1'
  GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Client unit tests (Vitest)
        run: npm run test -w client

      - name: Server tests (Vitest — unit + integration)
        run: npm run test -w server

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright)
        run: npx playwright test --config playwright.config.mjs --reporter=list
